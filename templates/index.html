<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SECE Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      width: 100%;
      background: #003366;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    header img {
      height: 48px;
      border-radius: 6px;
      background: white;
      padding: 4px;
    }

    header div h1 { font-size: 1.2rem; font-weight: 700; }
    header div p  { font-size: 0.8rem; opacity: 0.8; margin-top: 2px; }

    #chat-wrapper {
      width: 100%;
      max-width: 780px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px 16px 0;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-bottom: 12px;
      max-height: calc(100vh - 220px);
    }

    .msg {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.bot {
      background: white;
      color: #1a1a2e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .msg.user {
      background: #003366;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg.typing { color: #888; font-style: italic; }

    #input-bar {
      width: 100%;
      max-width: 780px;
      display: flex;
      gap: 10px;
      padding: 14px 16px;
      background: #f0f4f8;
      position: sticky;
      bottom: 0;
    }

    #input-bar input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 24px;
      border: 1.5px solid #ccd6e0;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }

    #input-bar input:focus { border-color: #003366; }

    #input-bar button {
      background: #003366;
      color: white;
      border: none;
      border-radius: 24px;
      padding: 12px 22px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    #input-bar button:hover { background: #004c99; }

    .suggested {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .chip {
      background: white;
      border: 1.5px solid #003366;
      color: #003366;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .chip:hover { background: #003366; color: white; }
  </style>
</head>
<body>

<header>
  <img src="https://sece.ac.in/wp-content/uploads/2022/01/sece-logo.png"
       onerror="this.style.display='none'" alt="SECE Logo" />
  <div>
    <h1>Sri Eshwar College — AI Chatbot</h1>
    <p>Ask me anything about SECE</p>
  </div>
</header>

<div id="chat-wrapper">
  <div id="messages">
    <div class="msg bot">Hi! I'm the SECE assistant. Ask me about departments, placements, admissions, campus life, research, or anything about Sri Eshwar College of Engineering.</div>
  </div>

  <div class="suggested" id="chips">
    <span class="chip" onclick="send('What departments are offered?')">Departments</span>
    <span class="chip" onclick="send('Tell me about placements')">Placements</span>
    <span class="chip" onclick="send('How to apply for admission?')">Admissions</span>
    <span class="chip" onclick="send('What facilities are available on campus?')">Campus Life</span>
    <span class="chip" onclick="send('Tell me about research at SECE')">Research</span>
    <span class="chip" onclick="send('What is the TNEA code?')">TNEA Code</span>
  </div>
</div>

<div id="input-bar">
  <input id="userInput" type="text" placeholder="Ask about Sri Eshwar College..." autocomplete="off" />
  <button type="button" onclick="send()">Send</button>
</div>

<script>
  const messagesEl = document.getElementById("messages");
  const input = document.getElementById("userInput");

  input.addEventListener("keydown", e => { if (e.key === "Enter") send(); });

  function addMsg(text, role) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  async function send(prefill) {
    const query = prefill || input.value.trim();
    if (!query) return;
    input.value = "";
    document.getElementById("chips").style.display = "none";

    addMsg(query, "user");
    const typing = addMsg("Thinking...", "bot typing");

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: query })
      });
      const data = await res.json();
      typing.className = "msg bot";
      typing.textContent = data.reply;
    } catch {
      typing.className = "msg bot";
      typing.textContent = "Something went wrong. Please try again.";
    }

    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
</script>
</body>
</html>
